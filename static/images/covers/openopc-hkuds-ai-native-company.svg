<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 组织架构示意 -->
  <g transform="translate(120, 130)" opacity="0.35">
    <rect x="0" y="0" width="200" height="50" rx="8" fill="#fbbf24"/>
    <line x1="100" y1="50" x2="100" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="100" y1="90" x2="40" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="100" y1="90" x2="160" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="100" y1="90" x2="280" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="40" y1="90" x2="40" y2="130" stroke="#fbbf24" stroke-width="2"/>
    <line x1="160" y1="90" x2="160" y2="130" stroke="#fbbf24" stroke-width="2"/>
    <line x1="280" y1="90" x2="280" y2="130" stroke="#fbbf24" stroke-width="2"/>
    <rect x="-40" y="130" width="160" height="40" rx="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <rect x="120" y="130" width="80" height="40" rx="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <rect x="240" y="130" width="80" height="40" rx="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <text x="100" y="32" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="20" font-weight="bold">Manager</text>
    <text x="40" y="156" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="14">Recruiter</text>
    <text x="160" y="156" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="14">Engineer</text>
    <text x="280" y="156" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="14">Reviewer</text>
  </g>

  <!-- 主标题 -->
  <text x="600" y="220" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="80" font-weight="900" letter-spacing="2">OpenOPC</text>
  <text x="600" y="280" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="34" font-weight="600">港大开源「AI 原生公司」框架</text>

  <!-- 三大机制 -->
  <g transform="translate(140, 360)">
    <rect x="0" y="0" width="280" height="120" rx="12" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="22" font-weight="bold">🏗️ Self-Built</text>
    <text x="140" y="75" text-anchor="middle" fill="#cbd5e1" font-family="sans-serif" font-size="16">自动招人组建架构</text>
    <text x="140" y="98" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14">Recruiter + Role</text>
  </g>
  <g transform="translate(460, 360)">
    <rect x="0" y="0" width="280" height="120" rx="12" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="22" font-weight="bold">⚙️ Self-Run</text>
    <text x="140" y="75" text-anchor="middle" fill="#cbd5e1" font-family="sans-serif" font-size="16">用状态机跑工作流</text>
    <text x="140" y="98" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14">Kanban + DAG</text>
  </g>
  <g transform="translate(780, 360)">
    <rect x="0" y="0" width="280" height="120" rx="12" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="22" font-weight="bold">🌱 Self-Grown</text>
    <text x="140" y="75" text-anchor="middle" fill="#cbd5e1" font-family="sans-serif" font-size="16">沉淀组织记忆</text>
    <text x="140" y="98" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14">Playbook</text>
  </g>

  <!-- 底部 meta -->
  <text x="600" y="555" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="20">HKUDS · Python · MIT</text>
  <text x="600" y="590" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">github.com/HKUDS/OpenOPC</text>
</svg>
