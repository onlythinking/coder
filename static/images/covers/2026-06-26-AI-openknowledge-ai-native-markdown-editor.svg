<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="280" r="380" fill="url(#glow)"/>

  <!-- 网格背景 -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 左侧 Markdown 节点图 -->
  <g transform="translate(140, 180)">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="#0ea5e9" opacity="0.85"/>
    <text x="90" y="23" text-anchor="middle" fill="#fff" font-family="ui-monospace, monospace" font-size="14" font-weight="600"># Wiki 节点</text>

    <line x1="90" y1="36" x2="60" y2="100" stroke="url(#accent)" stroke-width="2"/>
    <line x1="90" y1="36" x2="160" y2="100" stroke="url(#accent)" stroke-width="2"/>

    <rect x="-20" y="100" width="160" height="36" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="123" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, monospace" font-size="13">Claude 改写</text>

    <rect x="100" y="100" width="160" height="36" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="180" y="123" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, monospace" font-size="13">Codex 改写</text>

    <line x1="60" y1="136" x2="90" y2="200" stroke="url(#accent)" stroke-width="2"/>
    <line x1="180" y1="136" x2="90" y2="200" stroke="url(#accent)" stroke-width="2"/>

    <rect x="0" y="200" width="180" height="36" rx="6" fill="#f472b6" opacity="0.85"/>
    <text x="90" y="223" text-anchor="middle" fill="#fff" font-family="ui-monospace, monospace" font-size="14" font-weight="600">git commit</text>
  </g>

  <!-- 标题区 -->
  <g transform="translate(440, 180)">
    <text x="0" y="0" fill="url(#accent)" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" letter-spacing="4">AI-NATIVE MARKDOWN EDITOR</text>
    <text x="0" y="80" fill="#f8fafc" font-family="ui-sans-serif, system-ui" font-size="56" font-weight="800">OpenKnowledge</text>
    <text x="0" y="140" fill="#cbd5e1" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="600">把 Agent 变成 Wiki 的一等写作者</text>

    <!-- 数据徽章 -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="120" height="44" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="60" y="29" text-anchor="middle" fill="#22d3ee" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="700">329 stars</text>

      <rect x="140" y="0" width="140" height="44" rx="22" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="210" y="29" text-anchor="middle" fill="#a78bfa" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="700">HN 195 分</text>

      <rect x="300" y="0" width="160" height="44" rx="22" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
      <text x="380" y="29" text-anchor="middle" fill="#f472b6" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="700">GPL-3.0 开源</text>
    </g>

    <text x="0" y="320" fill="#94a3b8" font-family="ui-sans-serif, system-ui" font-size="18">Claude / Codex / Cursor 并行协作 · 本地优先 · git 同步</text>
  </g>

  <!-- 底部品牌 -->
  <text x="600" y="580" text-anchor="middle" fill="#475569" font-family="ui-sans-serif, system-ui" font-size="14" letter-spacing="2">编程码农 · onlythinking.com</text>
</svg>
