<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="t1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="t2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#3aa39a"/>
    </linearGradient>
    <linearGradient id="t3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Three timeline scale bars (left side) -->
  <g transform="translate(60, 130)">
    <!-- Computation bar -->
    <rect x="0" y="0" width="180" height="80" rx="8" fill="url(#glow1)"/>
    <rect x="0" y="20" width="160" height="6" rx="3" fill="#ff6b6b" opacity="0.4"/>
    <rect x="0" y="20" width="60" height="6" rx="3" fill="url(#t1)"/>
    <text x="0" y="14" font-family="ui-monospace, monospace" font-size="11" fill="#ff6b6b" font-weight="700">COMPUTATION</text>
    <text x="0" y="48" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" font-weight="600">单轮决策</text>
    <text x="0" y="68" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Max Mode N=5 + Judge</text>

    <!-- Memory bar -->
    <rect x="0" y="120" width="180" height="80" rx="8" fill="url(#glow2)"/>
    <rect x="0" y="140" width="160" height="6" rx="3" fill="#4ecdc4" opacity="0.4"/>
    <rect x="0" y="140" width="100" height="6" rx="3" fill="url(#t2)"/>
    <text x="0" y="134" font-family="ui-monospace, monospace" font-size="11" fill="#4ecdc4" font-weight="700">MEMORY</text>
    <text x="0" y="168" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" font-weight="600">单次任务</text>
    <text x="0" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Checkpoint-writer subagent</text>

    <!-- Evolution bar -->
    <rect x="0" y="240" width="180" height="80" rx="8" fill="url(#glow3)"/>
    <rect x="0" y="260" width="160" height="6" rx="3" fill="#ffd93d" opacity="0.4"/>
    <rect x="0" y="260" width="140" height="6" rx="3" fill="url(#t3)"/>
    <text x="0" y="254" font-family="ui-monospace, monospace" font-size="11" fill="#ffd93d" font-weight="700">EVOLUTION</text>
    <text x="0" y="288" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" font-weight="600">跨会话演化</text>
    <text x="0" y="308" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">/dream · /distill</text>
  </g>

  <!-- Title and subtitle -->
  <text x="60" y="100" font-family="ui-monospace, monospace" font-size="14" fill="#ffd93d" font-weight="700" letter-spacing="2">XIAOMI MIMO CODE · 10.4K ⭐</text>

  <text x="60" y="475" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">把 Coding Agent 的 long-horizon</text>
  <text x="60" y="525" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">问题拆成三个时间尺度</text>

  <text x="60" y="568" font-family="system-ui, sans-serif" font-size="20" fill="#cbd5e1">Computation · Memory · Evolution</text>

  <!-- Right side: terminal mockup with code -->
  <g transform="translate(640, 100)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="500" height="380" rx="12" fill="#0a0e27" stroke="#334155" stroke-width="2"/>
    <!-- Window header -->
    <rect x="0" y="0" width="500" height="36" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="18" r="5" fill="#ef4444"/>
    <circle cx="38" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="56" cy="18" r="5" fill="#22c55e"/>
    <text x="250" y="23" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">~/projects/mimo · mimo</text>

    <!-- Terminal content -->
    <g font-family="ui-monospace, monospace" font-size="13">
      <!-- Prompt line -->
      <text x="20" y="65" fill="#64748b">$ mimo --goal "tests pass + committed"</text>

      <!-- Max Mode indicator -->
      <text x="20" y="95" fill="#ff6b6b">▸ Max Mode: N=5 parallel candidates</text>
      <text x="20" y="115" fill="#94a3b8">  judge selecting best plan...</text>

      <!-- Memory section -->
      <text x="20" y="145" fill="#4ecdc4">▸ checkpoint.md updated (t=142/200)</text>
      <text x="20" y="165" fill="#94a3b8">  - phase: refactor auth module</text>
      <text x="20" y="183" fill="#94a3b8">  - next: extract JWT validator</text>

      <!-- Goal verification -->
      <text x="20" y="213" fill="#a78bfa">▸ /goal verifier: reviewing session...</text>
      <text x="20" y="233" fill="#94a3b8">  condition: tests pass + committed</text>

      <!-- Result -->
      <text x="20" y="265" fill="#22c55e">✓ all tests pass</text>
      <text x="20" y="283" fill="#22c55e">✓ commit abc1234 created</text>

      <!-- Status -->
      <text x="20" y="315" fill="#ffd93d">/dream: 7d memory sync scheduled</text>
      <text x="20" y="333" fill="#94a3b8">/distill: 3 workflow patterns found</text>

      <!-- Bottom prompt -->
      <text x="20" y="360" fill="#64748b">$ <tspan fill="#f8fafc">_</tspan></text>
    </g>
  </g>

  <!-- Bottom tags -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="86" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="43" y="15" font-family="ui-monospace, monospace" font-size="11" fill="#cbd5e1" text-anchor="middle">OpenCode</text>

    <rect x="96" y="0" width="118" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="155" y="15" font-family="ui-monospace, monospace" font-size="11" fill="#cbd5e1" text-anchor="middle">Claude Code</text>

    <rect x="224" y="0" width="82" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="265" y="15" font-family="ui-monospace, monospace" font-size="11" fill="#cbd5e1" text-anchor="middle">Co-Evolve</text>

    <rect x="316" y="0" width="92" height="22" rx="11" fill="#ffd93d"/>
    <text x="362" y="15" font-family="ui-monospace, monospace" font-size="11" fill="#0a0e27" font-weight="700" text-anchor="middle">HN 557 pts</text>
  </g>
</svg>