  <!-- Text content -->
  <text x="80" y="100" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#fbbf24" letter-spacing="2">CLAUDE DESIGN · LOCAL</text>

  <text x="80" y="450" font-family="system-ui, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">baoyu-design</text>
  <text x="80" y="510" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">把 claude.ai/design 装进本地 Agent</text>

  <!-- Tags row -->
  <g transform="translate(80, 555)">
    <rect x="0" y="0" width="78" height="28" rx="14" fill="#312e81" stroke="#a5b4fc" stroke-width="1"/>
    <text x="39" y="19" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e7ff" text-anchor="middle">Cursor</text>

    <rect x="90" y="0" width="124" height="28" rx="14" fill="#312e81" stroke="#a5b4fc" stroke-width="1"/>
    <text x="152" y="19" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e7ff" text-anchor="middle">Claude Code</text>

    <rect x="226" y="0" width="78" height="28" rx="14" fill="#312e81" stroke="#a5b4fc" stroke-width="1"/>
    <text x="265" y="19" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e0e7ff" text-anchor="middle">Codex</text>

    <rect x="316" y="0" width="100" height="28" rx="14" fill="#fbbf24"/>
    <text x="366" y="19" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">★ 1.6K stars</text>
