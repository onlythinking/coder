<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow behind mockup -->
  <ellipse cx="800" cy="315" rx="300" ry="220" fill="url(#glow)"/>

  <!-- Main browser-like mockup frame -->
  <g transform="translate(680, 110)">
    <rect x="0" y="0" width="440" height="280" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <!-- Browser header -->
    <rect x="0" y="0" width="440" height="36" rx="12" fill="#0f172a"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <text x="220" y="23" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">designs/meditation-app/settings.html</text>

    <!-- Mock content - 3 hi-fi variations -->
    <rect x="20" y="60" width="120" height="200" rx="6" fill="#f8fafc"/>
    <rect x="32" y="72" width="96" height="8" rx="4" fill="#1e293b"/>
    <rect x="32" y="90" width="60" height="6" rx="3" fill="#94a3b8"/>
    <rect x="32" y="110" width="96" height="50" rx="4" fill="#e0e7ff"/>
    <rect x="32" y="170" width="96" height="20" rx="4" fill="#fde68a"/>
    <rect x="32" y="200" width="96" height="20" rx="4" fill="#fecaca"/>
    <rect x="32" y="230" width="60" height="14" rx="7" fill="#0f172a"/>

    <rect x="160" y="60" width="120" height="200" rx="6" fill="#f8fafc" stroke="#fbbf24" stroke-width="2"/>
    <rect x="172" y="72" width="96" height="8" rx="4" fill="#1e293b"/>
    <rect x="172" y="90" width="60" height="6" rx="3" fill="#94a3b8"/>
    <rect x="172" y="110" width="96" height="50" rx="4" fill="#ddd6fe"/>
    <rect x="172" y="170" width="96" height="20" rx="4" fill="#a7f3d0"/>
    <rect x="172" y="200" width="96" height="20" rx="4" fill="#bfdbfe"/>
    <rect x="172" y="230" width="60" height="14" rx="7" fill="#0f172a"/>

    <rect x="300" y="60" width="120" height="200" rx="6" fill="#f8fafc"/>
    <rect x="312" y="72" width="96" height="8" rx="4" fill="#1e293b"/>
    <rect x="312" y="90" width="60" height="6" rx="3" fill="#94a3b8"/>
    <rect x="312" y="110" width="96" height="50" rx="4" fill="#fef3c7"/>
    <rect x="312" y="170" width="96" height="20" rx="4" fill="#fbcfe8"/>
    <rect x="312" y="200" width="96" height="20" rx="4" fill="#c7d2fe"/>
    <rect x="312" y="230" width="60" height="14" rx="7" fill="#0f172a"/>
  </g>

  <!-- Left side: code/folder icon -->
  <g transform="translate(80, 230)">
    <rect x="0" y="0" width="180" height="180" rx="16" fill="#fbbf24"/>
    <g transform="translate(30, 30)" fill="#1e293b">
      <path d="M0 12 L0 80 Q0 90 10 90 L110 90 Q120 90 120 80 L120 28 Q120 18 110 18 L40 18 L30 8 L10 8 Q0 8 0 18 Z" opacity="0.95"/>
      <rect x="20" y="40" width="80" height="4" rx="2" fill="#fbbf24"/>
      <rect x="20" y="52" width="60" height="4" rx="2" fill="#fbbf24"/>
      <rect x="20" y="64" width="70" height="4" rx="2" fill="#fbbf24"/>
    </g>
